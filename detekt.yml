build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongParameterList:
    active: false
  LongMethod:
    active: true
    threshold: 200
  TooManyFunctions:
    active: true
    thresholdInClasses: 35
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 20

exceptions:
  TooGenericExceptionThrown:
    active: true

naming:
  FunctionNaming:
    ignoreAnnotated:
      - Test

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  ReturnCount:
    active: true
    max: 4
