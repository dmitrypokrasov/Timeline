build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongParameterList:
    active: false
  LongMethod:
    active: false
  TooManyFunctions:
    active: false

exceptions:
  TooGenericExceptionThrown:
    active: false

naming:
  FunctionNaming:
    ignoreAnnotated:
      - Test

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  ReturnCount:
    active: false
